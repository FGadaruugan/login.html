<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  height:100vh;
  display:flex;
  flex-direction:column;
}

h2{
  text-align:center;
  margin:10px 0;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.message{
  background:white;
  padding:10px 14px;
  border-radius:15px;
  margin:8px 0;
  max-width:80%;
  word-wrap:break-word;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.input-area{
  display:flex;
  gap:8px;
  padding:10px;
  background:white;
  position:sticky;
  bottom:0;
}

.input-area{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:10px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  border-top:1px solid #ddd;
}

#msg{
  flex:1;
  height:48px;
  padding:0 15px;
  border:1px solid #ccc;
  border-radius:24px;
  font-size:16px;
}

button{
  width:80px;
  height:48px;
  border:none;
  border-radius:24px;
  background:#2196f3;
  color:white;
  font-size:16px;
}

#messages{
  padding:10px;
  margin-bottom:80px;
}

</style>
<body>

<h2>Private Chat</h2>

<div id="messages"></div>

<div class="input-area">
  <input id="msg" placeholder="Message">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNZRJhahF_avgK-QdaTajeTzfDyEL4D0E",
  authDomain: "badar-uugan.firebaseapp.com",
  projectId: "badar-uugan",
  storageBucket: "badar-uugan.firebasestorage.app",
  messagingSenderId: "795729467336",
  appId: "1:795729467336:web:9fd32edf40891d35ad52fd",
  measurementId: "G-ZEJVYTVSCP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const room = params.get("room");

const messagesDiv =
  document.getElementById("messages");

window.sendMessage = async function () {

  const text =
    document.getElementById("msg").value;

  if (!text) return;

  await addDoc(
    collection(db, "rooms", room, "messages"),
    {
      text: text,
      time: Date.now()
    }
  );

  document.getElementById("msg").value = "";

};

const q = query(
  collection(db, "rooms", room, "messages"),
  orderBy("time")
);

onSnapshot(q, (snapshot) => {

  messagesDiv.innerHTML = "";

  snapshot.forEach((doc) => {

    messagesDiv.innerHTML +=
      "<p>" + doc.data().text + "</p>";

  });

});

</script>

</body>
</html>
