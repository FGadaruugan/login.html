<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

.profile-card{
  width:90%;
  max-width:400px;
  margin:20px auto;
  background:white;
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,0,0,.1);
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#2196f3;
  color:white;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
}

#username{
  margin:10px 0;
}

#uid{
  color:gray;
  font-size:12px;
  word-break:break-all;
}

#users{
  margin-top:20px;
}

#users button{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:white;
  font-size:16px;
  margin-top:10px;
}

#chatBtn{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  background:#2196f3;
  color:white;
  font-size:16px;
  margin-top:15px;
}

</style>
</head>

<body>

<div class="profile-card">

<div class="avatar">👤</div>

<h2 id="username">Loading...</h2>

<p id="uid"></p>

<button id="chatBtn">Open Chat</button>

<h3>Users</h3>

<div id="users"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNZRJhahF_avgK-QdaTajeTzfDyEL4D0E",
  authDomain: "badar-uugan.firebaseapp.com",
  databaseURL: "https://badar-uugan-default-rtdb.firebaseio.com",
  projectId: "badar-uugan",
  storageBucket: "badar-uugan.firebasestorage.app",
  messagingSenderId: "795729467336",
  appId: "1:795729467336:web:08ea6ed53d3390e4ad52fd",
  measurementId: "G-M9CD9J6SG0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");

document.getElementById("uid").textContent =
"UID: " + uid;

try {

  const userDoc =
    await getDoc(doc(db, "users", uid));

  if (userDoc.exists()) {

    document.getElementById("username").textContent =
      "Welcome " + userDoc.data().username;

  }

} catch(e) {

  console.log(e);

}

const usersDiv =
  document.getElementById("users");

const snapshot =
  await getDocs(collection(db, "users"));

snapshot.forEach((user) => {

  const data = user.data();

  if(user.id !== uid){

    const btn =
      document.createElement("button");

    btn.textContent =
      data.username;

    btn.onclick = () => {

      const roomId =
        [uid, user.id]
        .sort()
        .join("_");

      location.href =
        "chat.html?room=" + roomId;

    };

    usersDiv.appendChild(btn);

  }

});

document.getElementById("chatBtn").onclick = () => {

  location.href = "chat.html";

};

</script>

</body>
</html>
