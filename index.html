<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f5f5f5;
      font-family:Arial,sans-serif;
    }

    .container{
      width:90%;
      max-width:350px;
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,.1);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
    }

    input{
      width:100%;
      height:50px;
      margin-bottom:15px;
      padding:0 15px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      height:50px;
      border:none;
      border-radius:12px;
      font-size:16px;
      color:white;
      margin-bottom:10px;
      cursor:pointer;
    }

    .register{
      background:#4caf50;
    }

    .login{
      background:#2196f3;
    }

    .forgot{
      background:#ff9800;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">

  <input type="email" id="email" placeholder="Email">

  <input type="password" id="password" placeholder="Password">

  <button class="register" onclick="register()">
    Register
  </button>

  <button class="login" onclick="login()">
    Login
  </button>

  <button class="forgot" onclick="resetPassword()">
    Forgot Password?
  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNZRJhahF_avgK-QdaTajeTzfDyEL4D0E",
  authDomain: "badar-uugan.firebaseapp.com",
  databaseURL: "https://badar-uugan-default-rtdb.firebaseio.com",
  projectId: "badar-uugan",
  storageBucket: "badar-uugan.firebasestorage.app",
  messagingSenderId: "795729467336",
  appId: "1:795729467336:web:08ea6ed53d3390e4ad52fd",
  measurementId: "G-M9CD9J6SG0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.register = async function () {

  const username =
    document.getElementById("username").value.trim();

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  if (!username || !email || !password) {
    alert("Бүх талбарыг бөглөнө үү!");
    return;
  }

  try {

    const userCredential =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    await setDoc(
      doc(
        db,
        "users",
        userCredential.user.uid
      ),
      {
        username: username,
        email: email,
        uid: userCredential.user.uid
      }
    );

    alert("Бүртгэл амжилттай!");

  } catch (e) {

    alert(e.message);

  }

};

window.login = async function () {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  if (!email || !password) {
    alert("Email болон Password оруулна уу!");
    return;
  }

  try {

    const userCredential =
      await signInWithEmailAndPassword(
        auth,
        email,
        password
      );

    const uid =
      userCredential.user.uid;

    window.location.href =
      "profile.html?uid=" + uid;

  } catch (e) {

    alert(e.message);

  }

};

window.resetPassword = async function () {

  const email =
    document.getElementById("email").value.trim();

  if (!email) {
    alert("Email оруулна уу!");
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);
    alert("Password reset email илгээгдлээ!");
  } catch (e) {
    alert(e.message);
  }

};

</script>

</body>
</html>
